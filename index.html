<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cee Cuatro | Official Site</title>

<style>
    :root {
        --black: #050505;
        --card: #181818;
        --text-dim: #b3b3b3;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        font-family: sans-serif;
        background: var(--black);
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* NAV */
    nav {
        width: 100%;
        padding: 20px 5%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 10;
    }

    .logo {
        font-weight: bold;
        letter-spacing: 2px;
    }

    .socials {
        display: flex;
        gap: 12px;
    }

    .socials a {
        color: white;
        opacity: 0.8;
        text-decoration: none;
        font-size: 0.9rem;
        transition: 0.2s;
    }

    .socials a:hover {
        opacity: 1;
        transform: scale(1.05);
    }

    /* HERO */
    header.hero {
        width: 100%;
        min-height: 25vh;
        background: linear-gradient(rgba(0,0,0,0.4), var(--black)), #111;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 100px 5% 40px;
    }

    .hero-inner {
        text-align: center;
        font-size: 1.2rem;
        letter-spacing: 3px;
        color: white;
    }

    /* TYPEWRITER CURSOR */
    #typewriter {
        border-right: 2px solid white;
        padding-right: 5px;
        white-space: nowrap;
        overflow: hidden;
    }

    /* CONTAINER */
    .container {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 5%;
    }

    .section-header {
        margin-bottom: 20px;
    }

    /* GRID */
    .discography-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 30px;
    }

    .album-card {
        background: var(--card);
        padding: 15px;
        border-radius: 10px;
        text-decoration: none;
        color: white;
        text-align: center;
        transition: 0.3s;
        display: block;
    }

    .album-card:hover {
        background: #282828;
        transform: translateY(-5px);
    }

    .img-container img {
        width: 100%;
        aspect-ratio: 1/1;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 10px;
    }

    /* SPOTIFY */
    .spotify-embed {
        margin-top: 20px;
        background: var(--card);
        padding: 15px;
        border-radius: 12px;
    }

    /* FOOTER */
    footer {
        width: 100%;
        padding: 60px 0;
        text-align: center;
        color: var(--text-dim);
        font-size: 0.8rem;
        letter-spacing: 2px;
        background: var(--black);
    }

    /* MOBILE */
    @media (max-width: 768px) {
        .discography-grid {
            grid-template-columns: 1fr 1fr;
        }
    }
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div class="logo">CEE CUATRO</div>

    <div class="socials">
        <a href="https://open.spotify.com/artist/1pjb5aGYKrEPxSMK4txdhk" target="_blank">Spotify</a>
        <a href="https://www.tiktok.com/@ceecuatrotv" target="_blank">TikTok</a>
        <a href="https://www.instagram.com/ceecuatrognt?igsh=eTAxOTFtbHA3YTBq&utm_source=qr" target="_blank">Instagram</a>
        <a href="https://www.youtube.com/@ceecuatrotv" target="_blank">YouTube</a>
    </div>
</nav>

<!-- HERO (TYPEWRITER) -->
<header class="hero">
    <div class="hero-inner">
        <span id="typewriter"></span>
    </div>
</header>

<!-- FEATURED -->
<div class="container">
    <h2 class="section-header">Featured Singles</h2>

    <div class="discography-grid">

        <a href="https://open.spotify.com/track/2oBDZW2thOpnt0Jpuphkzs" target="_blank" class="album-card">
            <div class="img-container">
                <img src="top2.webp" alt="TOP 2">
            </div>
            <h4>TOP 2</h4>
        </a>

        <a href="https://open.spotify.com/track/2vUtHZzwuXNOXSzynB7Npj" target="_blank" class="album-card">
            <div class="img-container">
                <img src="freesmoke.webp" alt="FREE SMOKE">
            </div>
            <h4>FREE SMOKE</h4>
        </a>

        <a href="https://open.spotify.com/track/4B5Ex7SvT1IgSJ7XVJhhmZ" target="_blank" class="album-card">
            <div class="img-container">
                <img src="alliknow.webp" alt="ALL I KNOW">
            </div>
            <h4>ALL I KNOW</h4>
        </a>

        <a href="https://open.spotify.com/track/0SAMEK2fq9RfpqnLk7xGIf" target="_blank" class="album-card">
            <div class="img-container">
                <img src="feelingaway.webp" alt="FEELING AWAY">
            </div>
            <h4>FEELING AWAY</h4>
        </a>

    </div>
</div>

<!-- SPOTIFY -->
<div class="container">
    <h2 class="section-header">Listen Now</h2>

    <div class="spotify-embed">
        <iframe style="border-radius:12px"
            src="https://open.spotify.com/embed/artist/1pjb5aGYKrEPxSMK4txdhk?utm_source=generator"
            width="100%"
            height="352"
            frameBorder="0"
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy">
        </iframe>
    </div>
</div>

<!-- FOOTER -->
<footer>
    <p>CEE CUATRO © 2026 • WEST LONDON</p>
</footer>

<!-- TYPEWRITER SCRIPT -->
<script>
const text = "TOP 2 OUT NOW";
let i = 0;
const speed = 120;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("typewriter").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
    }
}

typeWriter();
</script>

</body>
</html>
