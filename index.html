<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Cee Cuatro | Official Site</title>

<style>
:root {
    --primary: #ffffff;
    --accent: #1DB954;
    --bg-deep: #050505;
    --bg-card: #121212;
    --text-dim: #b3b3b3;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-color: var(--bg-deep);
    color: var(--primary);
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5rem 5%;
}

.logo {
    font-weight: 900;
    letter-spacing: 4px;
    font-size: 1.5rem;
}

/* SOCIAL ICONS */
.top-socials {
    display: flex;
    gap: 20px;
}

.top-socials svg {
    width: 24px;
    height: 24px;
    fill: white;
    transition: 0.3s;
}

.top-socials a:hover svg {
    fill: var(--accent);
    transform: scale(1.2);
}

/* CONTENT */
.container {
    padding: 3rem 5%;
}

.section-header {
    font-size: 1.8rem;
    margin-bottom: 2rem;
    border-left: 5px solid var(--accent);
    padding-left: 15px;
}

.discography-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 25px;
}

.album-card {
    background: var(--bg-card);
    padding: 15px;
    border-radius: 8px;
    transition: 0.3s;
}

.album-card:hover {
    background: #1a1a1a;
    transform: translateY(-5px);
}

.img-container {
    width: 100%;
    aspect-ratio: 1/1;
    overflow: hidden;
    border-radius: 4px;
}

.album-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.album-card h4 {
    margin-top: 10px;
    font-size: 0.9rem;
    letter-spacing: 1px;
}

a {
    text-decoration: none;
    color: inherit;
}

footer {
    text-align: center;
    padding: 2rem;
    color: var(--text-dim);
    font-size: 0.8rem;
}
</style>
</head>
