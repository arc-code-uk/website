<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cee Cuatro | Official Site</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ffffff;
            --accent: #1DB954; 
            --bg-deep: #050505;
            --bg-card: #121212;
            --text-dim: #b3b3b3;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--primary);
            overflow-x: hidden;
        }

        /* Nav */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            position: absolute;
            width: 90%;
            z-index: 1000;
        }

        .logo { font-weight: 900; letter-spacing: 4px; font-size: 1.5rem; }

        .top-socials a {
            color: #fff;
            margin-left: 20px;
            font-size: 1.6rem;
            transition: color 0.3s ease;
            text-decoration: none;
        }

        .top-socials a:hover {
            color: var(--accent);
        }

        /* Featured Video Hero */
        .video-hero {
            position: relative;
            width: 100%;
            padding-top: 100px;
            padding-bottom: 50px;
            background: linear-gradient(to bottom, #111, #050505);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .video-container {
            width: 85%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
            border: 1px solid #222;
            background: #000;
        }

        .video-info {
            text-align: center;
            margin-bottom: 30px;
        }

        .video-info h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 8px;
            font-weight: 900;
        }

        .badge {
            background: #fff;
            color: #000;
            padding: 4px 12px;
            font-weight: 800;
            font-size: 0.7rem;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        /* Music Content */
        .container { padding: 4rem 5%; }
        .section-header { font-size: 1.8rem; margin-bottom: 2rem; border-left: 5px solid var(--accent); padding-left: 15px; text-transform: uppercase; letter-spacing: 2px; }

        .discography-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            margin-bottom: 5rem;
        }

        .album-card {
            background: var(--bg-card);
            padding: 10px;
            border-radius: 4px;
            text-align: left;
            transition: 0.3s;
        }

        .album-card:hover { background: #1a1a1a; }
        .album-card img { width: 100%; border-radius: 2px; filter: grayscale(20%); }
        .album-card h4 { margin: 12px 0 4px 0; font-size: 0.9rem; text-transform: uppercase; }
        .album-card span { color: var(--text-dim); font-size: 0.75rem; }

        .player-wrapper {
            background: var(--bg-card);
            padding: 10px;
            border-radius: 12px;
        }

        footer {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .top-socials a { font-size: 1.3rem; margin-left: 15px; }
            .video-container { width: 95%; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CEE CUATRO</div>
        <div class="top-socials">
            <!-- Add actual links here -->
            <a href="https://www.instagram.com/ceecuatro" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://open.spotify.com/artist/1pjb5aGYKrEPxSMK4txdhk" target="_blank" title="Spotify"><i class="fab fa-spotify"></i></a>
            <a href="#" target="_blank" title="TikTok"><i class="fab fa-tiktok"></i></a>
            <a href="#" target="_blank" title="YouTube"><i class="fab fa-youtube"></i></a>
        </div>
    </nav>

    <section class="video-hero">
        <div class="video-info">
            <span class="badge">Featured Release</span>
            <h1>TOP 2</h1>
        </div>
        <div class="video-container">
            <!-- Replace 'VIDEO_ID' with the YT code for TOP 2 -->
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/VIDEO_ID" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </div>
    </section>

    <div class="container">
        
        <h2 class="section-header">Discography</h2>
        <div class="discography-grid">
            <div class="album-card">
                <img src="https://via.placeholder.com/400x400/111/fff?text=WHATS+LUV" alt="Whats Luv">
                <h4>Whats Luv?</h4>
                <span>2026 • Single</span>
            </div>
            <div class="album-card">
                <img src="https://via.placeholder.com/400x400/111/fff?text=FREE+SMOKE" alt="Free Smoke">
                <h4>FREE SMOKE</h4>
                <span>2025 • Single</span>
            </div>
            <div class="album-card">
                <img src="https://via.placeholder.com/400x400/111/fff?text=AVENGERS" alt="Avengers">
                <h4>AVENGERS</h4>
                <span>2025 • Single</span>
            </div>
            <div class="album-card">
                <img src="https://via.placeholder.com/400x400/111/fff?text=FEELING+A+WAY" alt="Feeling A Way">
                <h4>Feeling A Way</h4>
                <span>2025 • Single</span>
            </div>
        </div>

        <h2 class="section-header">Stream full catalog</h2>
        <div class="player-wrapper">
            <iframe style="border-radius:12px" src="https://open.spotify.com/embed/artist/1pjb5aGYKrEPxSMK4txdhk?utm_source=generator&theme=0" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

    </div>

    <footer>
        <p>CEE CUATRO &copy; 2026 • WEST LONDON</p>
    </footer>

</body>
</html>
