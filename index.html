<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cee Cuatro | Official Site</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ffffff;
            --accent: #1DB954; 
            --bg-deep: #050505;
            --bg-card: #121212;
            --text-dim: #b3b3b3;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--primary);
            overflow-x: hidden;
        }

        /* Nav */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            position: absolute;
            width: 90%;
            z-index: 1000;
        }

        .logo { font-weight: 900; letter-spacing: 4px; font-size: 1.5rem; text-transform: uppercase; }

        .top-socials a {
            color: #fff;
            margin-left: 20px;
            font-size: 1.6rem;
            transition: color 0.3s ease;
            text-decoration: none;
        }

        .top-socials a:hover { color: var(--accent); }

        /* Video Section */
        .video-hero {
            position: relative;
            width: 100%;
            padding-top: 100px;
            padding-bottom: 50px;
            background: linear-gradient(to bottom, #111, #050505);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .video-container {
            width: 85%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
            border: 1px solid #222;
            background: #000;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* The Box Under the Video */
        .video-link-box {
            margin-top: 25px;
            background: var(--bg-card);
            border: 1px solid #333;
            padding: 18px 50px;
            border-radius: 4px;
            text-decoration: none;
            transition: 0.3s ease;
            display: inline-block;
            text-align: center;
        }

        .video-link-box:hover {
            border-color: var(--accent);
            background: #1a1a1a;
            transform: translateY(-3px);
        }

        .video-link-box h2 {
            margin: 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 1.1rem;
            font-weight: 900;
        }

        /* Music Content */
        .container { padding: 4rem 5%; }
        .section-header { font-size: 1.8rem; margin-bottom: 2rem; border-left: 5px solid var(--accent); padding-left: 15px; text-transform: uppercase; letter-spacing: 2px; }

        .discography-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            margin-bottom: 5rem;
        }

        .song-link { text-decoration: none; color: inherit; }

        .album-card {
            background: var(--bg-card);
            padding: 12px;
            border-radius: 4px;
            text-align: left;
            transition: 0.3s;
        }

        .album-card:hover { background: #1a1a1a; transform: translateY(-5px); }
        .album-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 2px; }
        .album-card h4 { margin: 12px 0 4px 0; font-size: 0.9rem; text-transform: uppercase; }

        footer { text-align: center; padding: 3rem; color: var(--text-dim); font-size: 0.8rem; }

        @media (max-width: 768px) {
            .video-container { width: 95%; }
            .discography-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CEE CUATRO</div>
        <div class="top-socials">
            <a href="https://www.instagram.com/ceecuatrognt?igsh=eTAxOTFtbHA3YTBq&utm_source=qr" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@ceecuatrotv" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://open.spotify.com/artist/1pjb5aGYKrEPxSMK4txdhk" target="_blank"><i class="fab fa-spotify"></i></a>
            <a href="https://www.youtube.com/@ceecuatro" target="_blank"><i class="fab fa-youtube"></i></a>
        </div>
    </nav>

    <section class="video-hero">
        <div class="video-container">
            <!-- Ensure your video file in GitHub is named 'top2.mp4' -->
            <video controls autoplay muted loop playsinline>
                <source src="top2.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <!-- Box under the video that links to the song -->
        <a href="https://open.spotify.com/track/41e53a258079b768a8f89574" target="_blank" class="video-link-box">
            <h2>TOP 2 — OUT NOW</h2>
        </a>
    </section>

    <div class="container">
        <h2 class="section-header">Featured Singles</h2>
        <div class="discography-grid">
            
            <a href="https://open.spotify.com/track/41e53a258079b768a8f89574" target="_blank" class="song-link">
                <div class="album-card">
                    <img src="top2.jpg" alt="Top 2" onerror="this.src='https://placehold.co/400?text=TOP+2'">
                    <h4>TOP 2</h4>
                </div>
            </a>

            <a href="https://open.spotify.com/track/299716f6b59265f401f80749" target="_blank" class="song-link">
                <div class="album-card">
                    <img src="freesmoke.jpg" alt="Free Smoke" onerror="this.src='https://placehold.co/400?text=FREE+SMOKE'">
                    <h4>FREE SMOKE</h4>
                </div>
            </a>

            <a href="https://open.spotify.com/track/46850d995646f9035225d31f" target="_blank" class="song-link">
                <div class="album-card">
                    <img src="alliknow.jpg" alt="All I Know" onerror="this.src='https://placehold.co/400?text=ALL+I+KNOW'">
                    <h4>ALL I KNOW</h4>
                </div>
            </a>

            <a href="https://open.spotify.com/track/676b701255562095f3299c85" target="_blank" class="song-link">
                <div class="album-card">
                    <img src="feelinaway.jpg" alt="Feelin Away" onerror="this.src='https://placehold.co/400?text=FEELIN+AWAY'">
                    <h4>FEELIN AWAY</h4>
                </div>
            </a>

        </div>
    </div>

    <footer>
        <p>CEE CUATRO &copy; 2026 • WEST LONDON</p>
    </footer>

</body>
</html>
