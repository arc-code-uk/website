<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cee Cuatro | Official Site</title>
    <style>
        :root {
            --primary: #ffffff;
            --accent: #1DB954; 
            --bg-deep: #050505;
            --bg-card: #121212;
            --text-dim: #b3b3b3;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-deep);
            color: var(--primary);
            overflow-x: hidden;
        }

        /* Nav */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            position: absolute;
            width: 90%;
            z-index: 1000;
        }

        .logo { font-weight: 900; letter-spacing: 4px; font-size: 1.2rem; text-transform: uppercase; }

        .top-socials { display: flex; gap: 20px; }
        .top-socials svg { fill: white; width: 22px; height: 22px; transition: 0.3s; }
        .top-socials a:hover svg { fill: var(--accent); transform: scale(1.1); }

        /* Spotify Artist Header */
        .artist-hero {
            height: 70vh;
            min-height: 500px;
            background: linear-gradient(rgba(0,0,0,0) 20%, var(--bg-deep) 100%), 
                        linear-gradient(45deg, #1e1e1e, #000);
            display: flex;
            align-items: flex-end;
            padding: 0 5% 60px 5%;
        }

        .hero-content {
            display: flex;
            align-items: center;
            gap: 40px;
            width: 100%;
        }

        .artist-img {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 8px 50px rgba(0,0,0,0.6);
            border: 2px solid #222;
        }

        .artist-info h1 {
            font-size: clamp(3rem, 10vw, 7rem);
            margin: 0;
            font-weight: 900;
            letter-spacing: -3px;
        }

        .verified {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        .verified svg { fill: #3d91f4; width: 22px; }

        .stats-row {
            display: flex;
            gap: 25px;
            margin-top: 20px;
            color: var(--text-dim);
            font-size: 1.1rem;
        }
        .stats-row b { color: #fff; }

        .btn-group {
            margin-top: 35px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .play-main {
            background: var(--accent);
            color: #000;
            padding: 16px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .play-main:hover { transform: scale(1.05); background: #1ed760; }

        /* Grid */
        .container { padding: 4rem 5%; }
        .section-header { font-size: 1.5rem; margin-bottom: 2.5rem; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 10px; color: var(--text-dim); }

        .discography-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
        }

        .song-link { text-decoration: none; color: inherit; }
        .album-card {
            background: #181818;
            padding: 18px;
            border-radius: 10px;
            transition: 0.3s;
        }
        .album-card:hover { background: #282828; transform: translateY(-5px); }
        
        .img-wrap { width: 100%; aspect-ratio: 1/1; border-radius: 6px; overflow: hidden; background: #222; margin-bottom: 15px; }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .album-card h4 { margin: 0; font-size: 1.1rem; letter-spacing: 0.5px; }
        .album-card p { color: var(--text-dim); font-size: 0.85rem; margin-top: 5px; }

        footer { text-align: center; padding: 5rem 2rem; color: var(--text-dim); font-size: 0.8rem; border-top: 1px solid #111; }

        @media (max-width: 768px) {
            .hero-content { flex-direction: column; text-align: center; }
            .artist-img { width: 180px; height: 180px; }
            .stats-row { justify-content: center; font-size: 0.9rem; }
            .btn-group { justify-content: center; }
        }
    </style>
</head>
