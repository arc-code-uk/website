<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cee Cuatro | Official Site</title>

<style>
:root {
    --primary: #ffffff;
    --accent: #1DB954;
    --bg-deep: #050505;
    --bg-card: #121212;
    --text-dim: #b3b3b3;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-color: var(--bg-deep);
    color: var(--primary);
}

nav {
    display: flex;
    justify-content: space-between;
    padding: 1.5rem 5%;
}

.logo {
    font-weight: 900;
    letter-spacing: 4px;
    font-size: 1.5rem;
}

.container {
    padding: 3rem 5%;
}

.section-header {
    font-size: 1.8rem;
    margin-bottom: 2rem;
    border-left: 5px solid var(--accent);
    padding-left: 15px;
}

.discography-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 25px;
}

.album-card {
    background: var(--bg-card);
    padding: 15px;
    border-radius: 8px;
    transition: 0.3s;
}

.album-card:hover {
    background: #1a1a1a;
    transform: translateY(-5px);
}

.img-container {
    width: 100%;
    aspect-ratio: 1/1;
    overflow: hidden;
    border-radius: 4px;
}

.album-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.album-card h4 {
    margin-top: 10px;
    font-size: 0.9rem;
    letter-spacing: 1px;
}

a {
    text-decoration: none;
    color: inherit;
}

footer {
    text-align: center;
    padding: 2rem;
    color: var(--text-dim);
    font-size: 0.8rem;
}
</style>
</head>

<body>

<nav>
    <div class="logo">CEE CUATRO</div>
</nav>

<div class="container">
<h2 class="section-header">Featured Singles</h2>

<div class="discography-grid">

<!-- TOP 2 -->
<a href="https://open.spotify.com/track/2oBDZW2thOpnt0Jpuphkzs" target="_blank">
<div class="album-card">
<div class="img-container">
<img src="top2.webp" alt="TOP 2">
</div>
<h4>TOP 2</h4>
</div>
</a>

<!-- FREE SMOKE -->
<a href="https://open.spotify.com/track/2vUtHZzwuXNOXSzynB7Npj" target="_blank">
<div class="album-card">
<div class="img-container">
<img src="freesmoke.webp" alt="FREE SMOKE">
</div>
<h4>FREE SMOKE</h4>
</div>
</a>

<!-- ALL I KNOW -->
<a href="https://open.spotify.com/track/4B5Ex7SvT1IgSJ7XVJhhmZ" target="_blank">
<div class="album-card">
<div class="img-container">
<img src="alliknow.webp" alt="ALL I KNOW">
</div>
<h4>ALL I KNOW</h4>
</div>
</a>

<!-- FEELING AWAY -->
<a href="https://open.spotify.com/track/0SAMEK2fq9RfpqnLk7xGIf" target="_blank">
<div class="album-card">
<div class="img-container">
<img src="feelingaway.webp" alt="FEELING AWAY">
</div>
<h4>FEELING AWAY</h4>
</div>
</a>

</div>
</div>

<footer>
<p>CEE CUATRO © 2026 • WEST LONDON</p>
</footer>

</body>
</html>
